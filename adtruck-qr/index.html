<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>株式会社アドトラック</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f23;
    --accent: #e94560;
    --gold: #ffd700;
    --white: #f5f5f5;
    --gray: #b4b4c8;
    --dark-accent: #1e1e3c;
    --box-bg: #32142a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; }
  body {
    background: var(--bg);
    background: linear-gradient(180deg, #0f0f23 0%, #161636 50%, #0f0f23 100%);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--white);
    padding: 1.5rem 1rem;
    overflow-x: hidden;
  }
  .card {
    max-width: 480px;
    width: 100%;
    position: relative;
    padding: 3rem 2rem 2.5rem;
    text-align: center;
  }
  .card::before, .card::after {
    content: '';
    position: fixed;
    left: 0; right: 0;
    height: 5px;
    background: var(--accent);
  }
  .card::before { top: 0; }
  .card::after { bottom: 0; }
  .side-line {
    position: fixed;
    top: 3rem; bottom: 3rem;
    width: 1px;
    background: #2a2a4e;
  }
  .side-line.left { left: 1.2rem; }
  .side-line.right { right: 1.2rem; }
  .diamond {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--accent);
    transform: rotate(45deg);
  }
  .diamond.tl { top: 1.5rem; left: 1.5rem; }
  .diamond.tr { top: 1.5rem; right: 1.5rem; }
  .diamond.bl { bottom: 1.5rem; left: 1.5rem; }
  .diamond.br { bottom: 1.5rem; right: 1.5rem; }
  .thanks-sub {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 0.3rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.2s;
  }
  .thanks-main {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.4s;
  }
  .courage {
    font-size: 1.05rem;
    color: var(--gray);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.6s;
  }
  .highlight-box {
    display: inline-block;
    background: var(--box-bg);
    border: 2.5px solid var(--accent);
    border-radius: 14px;
    padding: 1rem 1.8rem;
    margin-bottom: 1.8rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.8s;
  }
  .highlight-box .text {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(233,69,96,0.3);
  }
  .action {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--white);
    line-height: 1.7;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 1.0s;
  }
  .divider {
    position: relative;
    width: 200px;
    height: 2px;
    background: #3c3c66;
    margin: 0 auto 1.8rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 1.2s;
  }
  .divider::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }
  .gift-text {
    font-size: 1.05rem;
    color: var(--white);
    margin-bottom: 0.3rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 1.4s;
  }
  .gift-highlight {
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 1.6s;
  }
  .company {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--gray);
    letter-spacing: 0.15em;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 2.0s;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 400px) {
    .thanks-main { font-size: 1.5rem; }
    .highlight-box .text { font-size: 1.3rem; }
    .highlight-box { padding: 0.8rem 1.2rem; }
  }
</style>
</head>
<body>
  <div class="side-line left"></div>
  <div class="side-line right"></div>
  <div class="diamond tl"></div>
  <div class="diamond tr"></div>
  <div class="diamond bl"></div>
  <div class="diamond br"></div>
  <div class="card">
    <p class="thanks-sub">テストにご協力いただき</p>
    <p class="thanks-main">ありがとうございます！</p>
    <p class="courage">その勇気ある行動に敬意を表して…</p>
    <div class="highlight-box">
      <span class="text">「QRコード見ました！」</span>
    </div>
    <p class="action">
      とアドトラック代表・宮本に<br>お声がけください。
    </p>
    <div class="divider"></div>
    <p class="gift-text">🎁 お好きな飲み物またはお菓子を</p>
    <p class="gift-highlight">どちらか一つプレゼント！</p>
    <div class="divider"></div>
    <p class="company">株式会社アドトラック</p>
  </div>
</body>
</html>
