<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>俊輝の自己紹介</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      max-width: 600px;
      width: 100%;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #0b8457, #11998e);
      color: #fff;
      text-align: center;
      padding: 40px 20px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      margin: 0 auto 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 48px;
      color: #fff;
      border: 4px solid rgba(255, 255, 255, 0.4);
    }

    .card-header h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .card-header p {
      font-size: 16px;
      opacity: 0.85;
    }

    .card-body {
      padding: 32px;
    }

    .section {
      margin-bottom: 24px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section h2 {
      font-size: 18px;
      color: #0b8457;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e6fff0;
    }

    .section p {
      color: #555;
      line-height: 1.8;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #e6fff0;
      color: #0b8457;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #aaa;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <script src="nav.js"></script>
  <div class="card" style="margin: auto;">
    <div class="card-header">
      <div class="avatar">T</div>
      <h1>俊輝</h1>
      <p>Toshiki</p>
    </div>
    <div class="card-body">
      <div class="section">
        <h2>About Me</h2>
        <p>はじめまして、俊輝です。このページをご覧いただきありがとうございます。日々新しいことを学びながら成長を続けています。</p>
      </div>
      <div class="section">
        <h2>趣味・興味</h2>
        <div class="tags">
          <span class="tag">AI学習</span>
          <span class="tag">Webサイト制作</span>
          <span class="tag">自動化</span>
          <span class="tag">データ分析</span>
          <span class="tag">ビジネス構築</span>
        </div>
      </div>
      <div class="section">
        <h2>ひとこと</h2>
        <p>Claude Codeで未来を変える！</p>
      </div>
    </div>
    <div class="footer">
      &copy; 2026 Toshiki. All rights reserved.
    </div>
  </div>
</body>
</html>
